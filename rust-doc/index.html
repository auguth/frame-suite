<!DOCTYPE html>
<html>
  <head>
  <meta charset="utf-8">
  <title>Crates Documentation</title>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 40px;
      background: #242424;
      color: #c9d1d9;
      justify-content: center;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 10px;
    }

    h1 {
      color: #f54c01;
      margin: 0;
    }

    .container {
      max-width: 700px;
      margin: 0 auto;
      text-align: center;
    }

    p {
      color: #d8d8d8;
      margin-bottom: 20px;
    }

    .card {
      display: block;
      background: #161b22;
      padding: 16px;
      margin: 10px 0;
      border-radius: 10px;
      border: 1px solid #30363d;
      transition: transform 0.15s ease, border-color 0.15s ease;
      text-decoration: none;
      color: #f54c01;
      font-weight: 500;
    }

    .card:hover {
      transform: translateY(-2px);
      border-color: #f54c01;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="header">
      <img
        width="36"
        height="36"
        src="https://crates.io/_app/immutable/assets/cargo.BEjkIoV4.png"
        alt="cargo"
      >
      <h1>Crates Documentation</h1>
    </div>

    <p>Select a crate to explore its documentation</p>

    <a href="frame_suite/index.html" class="card">frame-suite</a>
    <a href="frame_plugins/index.html" class="card">frame-plugins</a>
    <a href="pallet_authors/index.html" class="card">pallet-authors</a>
    <a href="pallet_chain_manager/index.html" class="card">pallet-chain-manager</a>
    <a href="pallet_commitment/index.html" class="card">pallet-commitment</a>
    <a href="pallet_xp/index.html" class="card">pallet-xp</a>
  </div>
</body>
</html>
