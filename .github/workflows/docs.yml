name: Docs

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUSTDOCFLAGS: "--cfg docsrs"

jobs:
  docs:
    name: Generate & Publish Docs
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang libclang-dev protobuf-compiler libssl-dev pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: Generate docs
        run: |
          cargo doc \
            --no-deps \
            --document-private-items \
            -p frame-suite \
            -p frame-plugins \
            -p pallet-authors \
            -p pallet-chain-manager \
            -p pallet-commitment \
            -p pallet-xp

      - name: Prepare deploy folder
        run: |
          mkdir -p deploy/rust-doc
          cp -r target/doc/* deploy/rust-doc/

      - name: Add root redirect index.html
        run: |
          cat <<'EOF' > deploy/index.html
          <!DOCTYPE html>
          <html>
            <head>
              <meta charset="utf-8">
              <meta http-equiv="refresh" content="0;url=rust-doc/">
            </head>
            <body></body>
          </html>
          EOF

      - name: Add rust-doc index.html
        run: |
          cat <<'EOF' > deploy/rust-doc/index.html
          <!DOCTYPE html>
          <html>
            <head>
              <meta charset="utf-8">
              <title>Crates Documentation</title>
              <style>
                body {
                  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
                  margin: 40px;
                  background: #0d1117;
                  color: #c9d1d9;
                  justify-content: center;
                }
                .header {
                  display: flex;
                  align-items: center;
                  justify-content: center;
                  gap: 12px;
                  margin-bottom: 10px;
                }
                h1 { color: #58a6ff; margin: 0; }
                .container { 
                  max-width: 700px; 
                  margin: 0 auto;
                  text-align: center;
                }
                p { color: #8b949e; margin-bottom: 20px; }
                .card {
                  background: #161b22;
                  padding: 16px;
                  margin: 10px 0;
                  border-radius: 10px;
                  border: 1px solid #30363d;
                  transition: transform 0.15s ease, border-color 0.15s ease;
                }
                .card:hover { transform: translateY(-2px); border-color: #58a6ff; }
                a { text-decoration: none; color: #58a6ff; font-weight: 500; }
              </style>
            </head>
            <body>
              <div class="container">
                <div class="header">
                  <img width="36" height="36" src="https://crates.io/_app/immutable/assets/cargo.BEjkIoV4.png" alt="cargo">
                  <h1>Crates Documentation</h1>
                </div>
                <p>Select a crate to explore its documentation</p>
                <div class="card"><a href="frame_suite/index.html">frame-suite</a></div>
                <div class="card"><a href="frame_plugins/index.html">frame-plugins</a></div>
                <div class="card"><a href="pallet_authors/index.html">pallet-authors</a></div>
                <div class="card"><a href="pallet_chain_manager/index.html">pallet-chain-manager</a></div>
                <div class="card"><a href="pallet_commitment/index.html">pallet-commitment</a></div>
                <div class="card"><a href="pallet_xp/index.html">pallet-xp</a></div>
              </div>
            </body>
          </html>
          EOF

      - name: Deploy to GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy       
          publish_branch: gh-pages
          force_orphan: true